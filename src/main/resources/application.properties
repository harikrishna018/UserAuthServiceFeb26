spring.application.name=userauthservice
server.port=${port}

# define all db related stuff
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/proddb2
spring.datasource.username=proddb_user_2
#spring.datasource.password=Scaler123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql= true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.client.service-url.defaultZone=http://localhost:8761/eureka/  

